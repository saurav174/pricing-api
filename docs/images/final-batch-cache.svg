<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-label="Final batch cache diagram">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#444" />
    </marker>
    <style>
      .container { fill: #f6f9ff; stroke: #456aa3; stroke-width: 2; rx: 18; }
      .box { fill: #fff; stroke: #2f3a4a; stroke-width: 2; rx: 12; }
      .cache { fill: #eefaf1; stroke: #357a47; stroke-width: 2; rx: 12; }
      .lock { fill: #f2edff; stroke: #6f54b8; stroke-width: 2; rx: 12; }
      .external { fill: #fff7e6; stroke: #9a6b00; stroke-width: 2; rx: 12; }
      .title { font: 700 18px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 700 15px Arial, sans-serif; fill: #33527d; }
      .text { font: 14px Arial, sans-serif; fill: #172033; }
      .label { font: 13px Arial, sans-serif; fill: #444; }
      .arrow { stroke: #444; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .muted { font: 12px Arial, sans-serif; fill: #555; }
    </style>
  </defs>

  <text x="560" y="34" text-anchor="middle" class="title">Final design: Rails refreshes and serves one full cached rate table</text>

  <rect x="35" y="206" width="150" height="78" class="box" />
  <text x="110" y="237" text-anchor="middle" class="title">User</text>
  <text x="110" y="262" text-anchor="middle" class="text">Requests one rate</text>

  <rect x="235" y="65" width="635" height="365" class="container" />
  <text x="552" y="96" text-anchor="middle" class="subtitle">Rails Pricing API</text>

  <rect x="275" y="205" width="165" height="85" class="box" />
  <text x="357" y="239" text-anchor="middle" class="title">Pricing Endpoint</text>
  <text x="357" y="265" text-anchor="middle" class="text">Return requested rate</text>

  <rect x="535" y="120" width="250" height="105" class="cache" />
  <text x="660" y="154" text-anchor="middle" class="title">Full Rate Table Cache</text>
  <text x="660" y="180" text-anchor="middle" class="text">36 rates + shared fetched_at</text>
  <text x="660" y="202" text-anchor="middle" class="muted">Inside Rails process memory</text>

  <rect x="535" y="285" width="250" height="95" class="lock" />
  <text x="660" y="319" text-anchor="middle" class="title">Refresh Section</text>
  <text x="660" y="345" text-anchor="middle" class="text">Process-level lock</text>
  <text x="660" y="366" text-anchor="middle" class="muted">Only one request refreshes</text>

  <rect x="930" y="285" width="160" height="95" class="external" />
  <text x="1010" y="318" text-anchor="middle" class="title">Dynamic Pricing API</text>
  <text x="1010" y="344" text-anchor="middle" class="text">Batch fetch</text>
  <text x="1010" y="365" text-anchor="middle" class="text">all 36 rates</text>

  <path d="M185 245 C215 245, 235 245, 275 245" class="arrow" />
  <text x="225" y="231" text-anchor="middle" class="label">GET pricing</text>

  <path d="M440 230 C485 184, 502 169, 535 169" class="arrow" />
  <text x="488" y="175" text-anchor="middle" class="label">check cache</text>

  <path d="M535 205 C492 246, 473 258, 440 260" class="arrow" />
  <text x="492" y="286" text-anchor="middle" class="label">valid: requested rate</text>

  <path d="M660 225 C660 250, 660 260, 660 285" class="arrow" />
  <text x="757" y="260" text-anchor="middle" class="label">missing / older than 5 min</text>

  <path d="M785 335 C835 335, 875 335, 930 335" class="arrow" />
  <text x="858" y="320" text-anchor="middle" class="label">one batch request</text>

  <path d="M930 365 C870 425, 775 430, 710 380" class="arrow" />
  <text x="835" y="442" text-anchor="middle" class="label">all 36 rates</text>

  <path d="M610 285 C575 260, 555 240, 585 225" class="arrow" />
  <text x="560" y="263" text-anchor="middle" class="label">update cache</text>

  <path d="M275 275 C215 365, 173 360, 135 284" class="arrow" />
  <text x="210" y="390" text-anchor="middle" class="label">single rate response</text>
</svg>
