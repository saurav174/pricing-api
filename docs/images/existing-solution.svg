<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260" role="img" aria-label="Existing solution diagram">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#444" />
    </marker>
    <style>
      .box { fill: #fff; stroke: #2f3a4a; stroke-width: 2; rx: 12; }
      .external { fill: #fff7e6; stroke: #9a6b00; stroke-width: 2; rx: 12; }
      .title { font: 700 18px Arial, sans-serif; fill: #172033; }
      .text { font: 14px Arial, sans-serif; fill: #172033; }
      .label { font: 13px Arial, sans-serif; fill: #444; }
      .arrow { stroke: #444; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="490" y="34" text-anchor="middle" class="title">Existing solution: every request calls the dynamic pricing API</text>

  <rect x="55" y="88" width="170" height="82" class="box" />
  <text x="140" y="120" text-anchor="middle" class="title">User</text>
  <text x="140" y="145" text-anchor="middle" class="text">Requests one rate</text>

  <rect x="385" y="78" width="210" height="102" class="box" />
  <text x="490" y="116" text-anchor="middle" class="title">Rails Pricing API</text>
  <text x="490" y="143" text-anchor="middle" class="text">Forwards request</text>

  <rect x="755" y="78" width="190" height="102" class="external" />
  <text x="850" y="112" text-anchor="middle" class="title">Dynamic Pricing API</text>
  <text x="850" y="139" text-anchor="middle" class="text">Calculates rate</text>

  <path d="M225 118 C285 118, 315 118, 385 118" class="arrow" />
  <text x="305" y="104" text-anchor="middle" class="label">GET pricing</text>

  <path d="M595 118 C660 118, 695 118, 755 118" class="arrow" />
  <text x="675" y="104" text-anchor="middle" class="label">POST /pricing</text>

  <path d="M755 152 C690 218, 655 224, 585 178" class="arrow" />
  <text x="675" y="225" text-anchor="middle" class="label">fresh rate</text>

  <path d="M385 152 C315 218, 280 224, 215 170" class="arrow" />
  <text x="300" y="225" text-anchor="middle" class="label">rate response</text>
</svg>
